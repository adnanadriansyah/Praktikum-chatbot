<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tenant Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:        #0a0a0f;
            --bg-surface:     #111118;
            --bg-elevated:    #18181f;
            --bg-hover:       #1e1e28;
            --border:         rgba(255,255,255,0.06);
            --border-active:  rgba(255,255,255,0.14);
            --text-primary:   #f0f0f5;
            --text-secondary: #8585a0;
            --text-muted:     #4a4a60;
            --accent:         #7c6af7;
            --accent-soft:    rgba(124,106,247,0.12);
            --accent-glow:    rgba(124,106,247,0.25);
            --gem-1: #7c6af7; --gem-2: #4fc3f7; --gem-3: #ab47bc;
            --sidebar-w: 260px;
            --header-h:  60px;
            --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Sora',sans-serif;
            background:var(--bg-base); color:var(--text-primary);
            height:100vh; display:flex; flex-direction:column; overflow:hidden;
        }

        /* ── BACKGROUND ORBS ── */
        .bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.07; animation:orb-drift 18s ease-in-out infinite; }
        .orb-1 { width:500px; height:500px; background:var(--gem-1); top:-120px; left:-120px; }
        .orb-2 { width:400px; height:400px; background:var(--gem-2); bottom:-100px; right:-100px; animation-delay:-6s; }
        .orb-3 { width:300px; height:300px; background:var(--gem-3); top:40%; left:50%; animation-delay:-12s; }
        @keyframes orb-drift {
            0%,100% { transform:translate(0,0) scale(1); }
            33%      { transform:translate(30px,-30px) scale(1.05); }
            66%      { transform:translate(-20px,20px) scale(0.95); }
        }

        /* ── HEADER ── */
        .header {
            position:relative; z-index:20;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 20px; height:var(--header-h);
            background:rgba(10,10,15,0.92); backdrop-filter:blur(24px);
            border-bottom:1px solid var(--border); flex-shrink:0;
        }
        .header-left  { display:flex; align-items:center; gap:10px; }
        .header-right { display:flex; align-items:center; gap:8px; }

        .btn-icon {
            width:34px; height:34px; border-radius:var(--radius-sm);
            background:transparent; border:1px solid var(--border);
            color:var(--text-secondary); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.2s; flex-shrink:0;
        }
        .btn-icon:hover { background:var(--bg-elevated); border-color:var(--border-active); color:var(--text-primary); }
        .btn-icon svg   { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; }

        .gem-logo {
            width:34px; height:34px; border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg, var(--accent) 0%, #4fc3f7 50%, #ab47bc 100%);
            position:relative; overflow:hidden; flex-shrink:0; transition:background 0.4s;
        }
        .gem-logo::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15)); }
        .gem-logo svg { width:18px; height:18px; fill:white; position:relative; z-index:1; }

        .brand-text  { display:flex; flex-direction:column; gap:1px; }
        .brand-name  { font-size:15px; font-weight:600; letter-spacing:-0.02em; }
        .brand-model { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; letter-spacing:0.04em; }

        /* ── TENANT BADGE & SWITCH BUTTON ── */
        #tenant-selector-wrap { display:flex; align-items:center; gap:6px; }

        .btn-change-tenant {
            display:inline-flex; align-items:center; gap:6px;
            font-size:11.5px; font-family:'JetBrains Mono', monospace;
            color:var(--accent); background:var(--accent-soft);
            border:1px solid rgba(124,106,247,0.22);
            border-radius:20px; padding:5px 12px;
            letter-spacing:0.03em; cursor:pointer;
            transition:all 0.2s;
        }
        .btn-change-tenant:hover {
            background:rgba(124,106,247,0.22);
            border-color:rgba(124,106,247,0.4);
            transform:translateY(-1px);
        }
        .btn-change-tenant .badge-dot {
            width:5px; height:5px; border-radius:50%;
            background:var(--accent); animation:badge-pulse 2s ease-in-out infinite;
            flex-shrink:0;
        }
        @keyframes badge-pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.8); }
        }

        .btn-new {
            display:flex; align-items:center; gap:6px; padding:7px 14px;
            background:var(--accent-soft); border:1px solid rgba(124,106,247,0.2);
            border-radius:var(--radius-sm); color:var(--accent);
            font-family:'Sora',sans-serif; font-size:13px; font-weight:500;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-new:hover { background:rgba(124,106,247,0.2); border-color:rgba(124,106,247,0.35); transform:translateY(-1px); }
        .btn-new svg   { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; }

        /* ── APP BODY ── */
        .app-body { flex:1; display:flex; position:relative; z-index:1; overflow:hidden; }

        /* ── SIDEBAR ── */
        .sidebar {
            width:var(--sidebar-w); flex-shrink:0;
            background:rgba(11,11,17,0.97); border-right:1px solid var(--border);
            display:flex; flex-direction:column;
            transition:width 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease;
            overflow:hidden;
        }
        .sidebar.collapsed { width:0; opacity:0; pointer-events:none; }

        .sidebar-head {
            padding:14px 14px 10px; flex-shrink:0;
            border-bottom:1px solid var(--border);
        }
        .sidebar-label {
            font-size:10px; font-family:'JetBrains Mono',monospace;
            letter-spacing:0.1em; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;
        }
        .sidebar-tenant-info {
            display:flex; align-items:center; gap:8px;
            padding:8px 10px; border-radius:var(--radius-sm);
            background:var(--accent-soft); border:1px solid rgba(124,106,247,0.15);
        }
        .sidebar-tenant-icon { font-size:16px; flex-shrink:0; }
        .sidebar-tenant-name { font-size:12px; font-weight:600; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        .history-list { flex:1; overflow-y:auto; padding:8px; }
        .history-list::-webkit-scrollbar { width:3px; }
        .history-list::-webkit-scrollbar-thumb { background:var(--bg-elevated); border-radius:3px; }

        .history-group        { margin-bottom:14px; }
        .history-group-label  { font-size:10px; font-family:'JetBrains Mono',monospace; letter-spacing:0.08em; color:var(--text-muted); padding:2px 8px 6px; }

        .history-item {
            display:flex; align-items:center; gap:8px; padding:8px 10px;
            border-radius:var(--radius-sm); cursor:pointer; transition:all 0.15s;
            border:1px solid transparent; min-width:0;
        }
        .history-item:hover  { background:var(--bg-elevated); border-color:var(--border); }
        .history-item.active { background:var(--accent-soft); border-color:rgba(124,106,247,0.2); }

        .history-icon { width:28px; height:28px; border-radius:7px; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px; }
        .history-item.active .history-icon { background:var(--accent-soft); }

        .history-info  { flex:1; min-width:0; }
        .history-title { font-size:12.5px; font-weight:500; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .history-item.active .history-title { color:var(--accent); }
        .history-meta  { font-size:10px; color:var(--text-muted); margin-top:1px; font-family:'JetBrains Mono',monospace; }

        .btn-del { width:22px; height:22px; border-radius:5px; background:transparent; border:none; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:all 0.15s; flex-shrink:0; }
        .history-item:hover .btn-del { opacity:1; }
        .btn-del:hover { background:rgba(255,60,60,0.12); color:#ff6b6b; }
        .btn-del svg   { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2; }

        .history-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; text-align:center; padding:20px; }
        .history-empty-icon { font-size:28px; opacity:0.3; margin-bottom:10px; }
        .history-empty-text { font-size:12px; color:var(--text-muted); line-height:1.6; }

        /* ── CHAT AREA ── */
        .chat-area        { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .messages-wrapper { flex:1; overflow-y:auto; scroll-behavior:smooth; }
        .messages-wrapper::-webkit-scrollbar       { width:4px; }
        .messages-wrapper::-webkit-scrollbar-thumb { background:var(--bg-elevated); border-radius:4px; }
        .messages { max-width:760px; margin:0 auto; padding:0 20px 20px; }

        /* ── WELCOME ── */
        .welcome {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            min-height:calc(100vh - 180px); text-align:center; padding:40px 20px;
            animation:welcome-in 0.6s ease both;
        }
        @keyframes welcome-in { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .welcome-gem {
            width:72px; height:72px; border-radius:22px;
            background:linear-gradient(135deg, var(--accent) 0%, #4fc3f7 50%, #ab47bc 100%);
            display:flex; align-items:center; justify-content:center; margin-bottom:28px;
            animation:gem-pulse 3s ease-in-out infinite; transition:background 0.4s;
        }
        @keyframes gem-pulse {
            0%,100% { box-shadow:0 0 0 0 var(--accent-glow); }
            50%      { box-shadow:0 0 30px 10px var(--accent-glow); }
        }
        .welcome-gem svg { width:36px; height:36px; fill:white; }
        .welcome-title   { font-size:30px; font-weight:600; letter-spacing:-0.04em; margin-bottom:10px; background:linear-gradient(135deg,#f0f0f5 0%,#8080a0 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .welcome-sub     { font-size:14px; color:var(--text-secondary); margin-bottom:44px; font-weight:300; }
        #welcome-tenant-name { color:var(--accent); font-weight:600; -webkit-text-fill-color:var(--accent); }

        .capabilities-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:540px; width:100%; }
        .cap-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; text-align:left; cursor:pointer; transition:all 0.2s; }
        .cap-card:hover { background:var(--bg-elevated); border-color:var(--border-active); transform:translateY(-2px); }
        .cap-icon { font-size:18px; margin-bottom:7px; display:block; }
        .cap-text { font-size:12px; color:var(--text-secondary); line-height:1.4; }

        /* ── MESSAGES ── */
        .message {
            display:flex; gap:14px; padding:22px 0;
            border-bottom:1px solid var(--border);
            animation:msg-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
        }
        .message:last-child { border-bottom:none; }
        @keyframes msg-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        .avatar { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
        .message.bot  .avatar { background:linear-gradient(135deg, var(--accent), #4fc3f7); transition:background 0.4s; }
        .message.bot  .avatar svg { width:16px; height:16px; fill:white; }
        .message.user .avatar { background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-secondary); font-size:13px; font-weight:600; }

        .msg-body    { flex:1; min-width:0; }
        .msg-sender  { font-size:11.5px; font-weight:500; margin-bottom:6px; font-family:'JetBrains Mono',monospace; letter-spacing:0.05em; color:var(--text-muted); }
        .message.bot .msg-sender { color:var(--accent); }

        /* Teks pesan — pre-wrap agar baris baru tampil */
        .msg-content {
            font-size:14.5px; line-height:1.8; color:var(--text-primary);
            word-wrap:break-word; white-space:pre-wrap;
        }
        .message.user .msg-content { color:#c8c8dc; }

        /* ── TYPING ── */
        .typing-wrap      { display:none; gap:14px; padding:22px 0; }
        .typing-wrap.show { display:flex; }
        .typing-dots      { display:flex; gap:5px; align-items:center; padding-top:6px; }
        .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:dot-bounce 1.3s ease-in-out infinite; opacity:0.4; }
        .dot:nth-child(2) { animation-delay:0.15s; }
        .dot:nth-child(3) { animation-delay:0.3s; }
        @keyframes dot-bounce { 0%,80%,100% { transform:translateY(0); opacity:0.4; } 40% { transform:translateY(-6px); opacity:1; } }

        /* ── INPUT AREA ── */
        .input-area  { flex-shrink:0; padding:16px 20px 22px; background:rgba(10,10,15,0.85); backdrop-filter:blur(24px); border-top:1px solid var(--border); }
        .input-inner { max-width:760px; margin:0 auto; }
        .input-box   {
            display:flex; align-items:flex-end; gap:10px;
            background:var(--bg-surface); border:1px solid var(--border);
            border-radius:var(--radius-lg); padding:12px 14px 12px 18px;
            transition:border-color 0.2s, box-shadow 0.2s;
        }
        .input-box:focus-within { border-color:rgba(124,106,247,0.4); box-shadow:0 0 0 3px var(--accent-glow); }

        #msg {
            flex:1; background:transparent; border:none; outline:none;
            font-family:'Sora',sans-serif; font-size:14px; color:var(--text-primary);
            resize:none; min-height:22px; max-height:180px; line-height:1.6; padding:0;
        }
        #msg::placeholder { color:var(--text-muted); }

        #send-btn {
            width:36px; height:36px; border-radius:10px; border:none;
            background:var(--accent); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; transition:all 0.2s;
        }
        #send-btn:hover:not(:disabled) { filter:brightness(1.15); transform:scale(1.06); }
        #send-btn:disabled             { background:var(--bg-elevated); opacity:0.5; cursor:not-allowed; }
        #send-btn svg { width:16px; height:16px; stroke:white; fill:none; stroke-width:2.5; }

        .input-hint  { display:flex; align-items:center; justify-content:center; gap:6px; font-size:11px; color:var(--text-muted); margin-top:10px; }
        .hint-key    { font-family:'JetBrains Mono',monospace; font-size:10px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:4px; padding:1px 5px; color:var(--text-secondary); }

        /* ── MOBILE ── */
        .sidebar-overlay      { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:15; backdrop-filter:blur(4px); }
        .sidebar-overlay.show { display:block; }

        @media (max-width:700px) {
            .sidebar {
                position:fixed; top:var(--header-h); left:0; bottom:0; z-index:16;
                transform:translateX(-100%); width:var(--sidebar-w) !important;
                transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
            }
            .sidebar.open     { transform:translateX(0); }
            .sidebar.collapsed { width:var(--sidebar-w) !important; opacity:1; pointer-events:all; }

            .capabilities-grid { grid-template-columns:repeat(2,1fr); }
            .welcome-title     { font-size:22px; }
            .header            { padding:0 14px; }
            .messages          { padding:0 16px 16px; }
            .input-area        { padding:12px 16px 20px; }
            .brand-model       { display:none; }
            .btn-new span      { display:none; }
        }
    </style>
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<header class="header">
    <div class="header-left">
        <button class="btn-icon" id="sidebar-toggle" title="Tampilkan/Sembunyikan Riwayat" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="gem-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="brand-text">
            <span class="brand-name" id="bot-name">Chatbot</span>
            <span class="brand-model">multi-tenant · v1.0</span>
        </div>
    </div>

    <div class="header-right">
        <!-- Diisi oleh script.js: tombol ganti tenant -->
        <div id="tenant-selector-wrap"></div>

        <button class="btn-new" id="btn-new-chat" title="Mulai chat baru" aria-label="New chat">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>New Chat</span>
        </button>
    </div>
</header>

<div class="app-body">

    <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

    <aside class="sidebar" id="sidebar" aria-label="Riwayat percakapan">
        <div class="sidebar-head">
            <div class="sidebar-label">Riwayat Chat</div>
            <div class="sidebar-tenant-info" id="sidebar-tenant-info">
                <span class="sidebar-tenant-icon" id="sidebar-tenant-icon">💬</span>
                <span class="sidebar-tenant-name" id="sidebar-tenant-name">—</span>
            </div>
        </div>
        <div class="history-list" id="history-list"></div>
    </aside>

    <div class="chat-area">
        <div class="messages-wrapper" id="messages-wrapper" role="log" aria-live="polite">
            <div class="messages" id="messages">

                <div class="welcome" id="welcome-screen">
                    <div class="welcome-gem" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    </div>
                    <h1 class="welcome-title">Halo! Saya <span id="welcome-tenant-name">...</span></h1>
                    <p class="welcome-sub" id="welcome-sub">Ada yang bisa saya bantu hari ini?</p>

                    <div class="capabilities-grid">
                        <div class="cap-card" onclick="promptSuggestion('Ceritakan tentang layanan yang tersedia')">
                            <span class="cap-icon">📋</span>
                            <span class="cap-text">Layanan tersedia</span>
                        </div>
                        <div class="cap-card" onclick="promptSuggestion('Saya butuh bantuan dan rekomendasi')">
                            <span class="cap-icon">💡</span>
                            <span class="cap-text">Minta rekomendasi</span>
                        </div>
                        <div class="cap-card" onclick="promptSuggestion('Apa saja yang bisa kamu bantu?')">
                            <span class="cap-icon">🎯</span>
                            <span class="cap-text">Kemampuan bot</span>
                        </div>
                        <div class="cap-card" onclick="promptSuggestion('Bagaimana cara menghubungi tim kalian?')">
                            <span class="cap-icon">📞</span>
                            <span class="cap-text">Hubungi tim</span>
                        </div>
                        <div class="cap-card" onclick="promptSuggestion('Berikan informasi lengkap tentang produk atau layanan unggulan')">
                            <span class="cap-icon">⭐</span>
                            <span class="cap-text">Produk unggulan</span>
                        </div>
                        <div class="cap-card" onclick="promptSuggestion('Saya punya pertanyaan khusus')">
                            <span class="cap-icon">❓</span>
                            <span class="cap-text">Pertanyaan lain</span>
                        </div>
                    </div>
                </div>

                <div class="typing-wrap" id="typing" aria-label="Bot sedang mengetik" aria-live="polite">
                    <div class="avatar" style="background:linear-gradient(135deg,var(--accent),#4fc3f7);" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="white">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="typing-dots" aria-hidden="true">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="input-area">
            <div class="input-inner">
                <div class="input-box">
                    <textarea id="msg" placeholder="Kirim pesan..." rows="1" autocomplete="off" autofocus aria-label="Kotak pesan"></textarea>
                    <button id="send-btn" title="Kirim pesan" aria-label="Kirim pesan">
                        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <div class="input-hint" aria-hidden="true">
                    <span>Tekan</span>
                    <kbd class="hint-key">Enter</kbd>
                    <span>kirim ·</span>
                    <kbd class="hint-key">Shift+Enter</kbd>
                    <span>baris baru</span>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
